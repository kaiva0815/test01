<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--타이틀 태그는 글씨만 적는다 그래서 주석도 출력이 된다.-->
    <title>Document</title>
</head>
<body>
    <!-- li 는 ol이나 ul안에만 있을 수 있다 같은 li끼리는 안된다. -->
    <ul>
        <li>아이템1</li>
        <li>아이템2</li>
        <li>아이템3</li>
        <!--아이템4-->
        <li>
            <a href="http://naver.com">네이버</a></li>
    </ul>

    <ol>
        <li>아이템1</li>
        <li>아이템2</li>
        <li>아이템3</li>
        <!--아이템4-->
        <li>
            <a href="http://naver.com">네이버</a></li>
    </ol>

    <ul>
        <li>리스트1</li>
        <li>
            <ul>
                <li>리스트2-1</li>
                <li>리스트2-2</li>
            </ul>
        </li>
    </ul>
    

    <dl>
        <dt> dl태그</dt>
        <dd> 용어와 설명을 적는 구조</dd>
    </dl>
    <!-- ul>li*5 를 할때 띄워쓰기를 하면 안된다.-->

</body>
</html>
