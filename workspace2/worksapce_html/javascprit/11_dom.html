<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #view {
            color: red;
        }

        #view.pizza{
            font-size: 2em;
        }

        .blue{
            color: blue;
        }
        .bg-yellow{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1 id="title">DOM 연습</h1>

    <div id="view">첫번째 view</div>
    <div id="view" class="pizza">두번째 view</div>

    <ul id="메뉴">
        <li class="menu li1">치킨</li>
        <li class="menu pizza">피자</li>
        <li >똠양꿍</li>
        <li>집밥</li>
    </ul>

    <img id="aha"alt="대머리" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcStybJA7TtuXADBsKiZH5gspbbHUUrUCEbXUp6-our6FA&s=10">

    <div id="div1">div1</div>
    <div id="div2" class="bg-yellow">div2</div>


    <script>
        // DOM
        // Document Object Model
        // javascript로 수정이 가능한 대상
        console.log(document)
        // id 속성으로 DOM을 가져오기
        
        const title = document.getElementById('title')
        console.log(title)
        console.log(''+title)


        // 없으면 null
        const title2 = document.getElementById('title2')
        console.log(title2)

        // 동일한 id가 여러개 있어도
        // 첫번째 DOM만 가져온다
        const view= document.getElementById('view')
        console.log(view)

        // tag로 찾기
        let divs = document.getElementsByTagName('div')
        console.log(divs)


        // 없으면 length가 0인 배열
        let divs2= document.getElementsByName('divs2')
        console.log(divs2)
        if(divs2){
            console.log('참')
        }

        let menus = document.getElementsByClassName('menu')

        console.log(menus)
        // 직접 #메뉴 가져오기
        let 메뉴 = document.getElementById('메뉴')

        // 특정 DOM 안에서도 찾을 수 있다

        let pizza = 메뉴.getElementsByClassName('pizza')
        console.log(pizza)

        // querySelector
        //      CSS선택자를 사용 할 수 있다.
        //      하나의 DOM 만 돌려준다
        //      여러개의 경우 첫번째 DOM만 돌려준다
        //      없는 경우 null

        let view2 = document.querySelector('#view.pizza')

        console.log(view2)

        let view3 = document.querySelector('div#view')
        console.log(view3)
        // 무조건 첫번째 것만 가져옴
        
        let view4 = document.querySelector('div#view4')
        console.log(view4)

        let qsa= document.querySelectorAll('div#view')
        console.log(qsa)




        ////////////////////////////
        // 속성
        ////////////////////////////

        let aha = document.querySelector('#aha')
        console.log(aha)

        //속성명이 있는가? hasAttribute
        // readonly disabled required 등 검사할 때 좋다.
        let isSrc = aha.hasAttribute('src')
        console.log(isSrc,'isSrc')
        
        // 속성값 바꾸기
        //      원래 있으면 바꾸고
        //      원래 없으면 만들어 준다.
        let src = aha.getAttribute('src')
        console.log('src',src)

        // 없을경우 null 
        let src2 = aha.getAttribute('src2')
        console.log('src2',src2)

        setTimeout(function(){
            
            aha.setAttribute('src', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTTfcB1NnULAVwTNt6Oj3pRWq5H_H1Iu5UZNQetJZrTdg&s=10')
        },1000*2)

        // 없으면 추가
        aha.setAttribute('human', '교육센터')
        
        // 속성 자체를 제거함.
        aha.removeAttribute('human')




        // 클래스 조작
        let div1 = document.querySelector('#div1')
        let div2 = document.querySelector('#div2')
        div1.classList.add('blue')
        // class를 배열로 돌려줌
        console.log(div2.classList)


        // add : class 추가
        div1.classList.add('blue')
        // 이미 있는것은 추가하지않음
        div1.classList.add('blue')


        // remove= class 빼기
        div1.classList.remove('blue')
        // 없어도 에러 안남
        div1.classList.remove('blue')
        // 있으면 끄고 없으면 켜준다
        div1.classList.toggle('blue')
        div1.classList.toggle('blue')
        
        // contains는 있는지 없는지 판단해준다
        let isblue=div1.classList.contains('blue')
        console.log(isblue)

        // div2를 가져와서 class 블루 적용

        

        div2.classList.add('blue')

        div2.remove()
        


        

        
        

        

        
    </script>
</body>
</html>
