<body>
    <!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Human Study v1.0.16</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Pretendard",Arial,sans-serif;
color:#222;
}


/* HEADER */

.header{

height:90px;

width:1200px;

max-width:90%;

margin:auto;

display:flex;

align-items:center;

justify-content:space-between;

}


.logo{

font-size:30px;

font-weight:900;

color:#2563eb;

}


.logo span{

display:block;

font-size:13px;

letter-spacing:3px;

color:#555;

}



.nav{

display:flex;

gap:22px;

}



.nav a{

text-decoration:none;

color:#222;

font-weight:600;

font-size:14px;

}




.header-right button{

background:#2563eb;

color:white;

border:0;

padding:14px 28px;

border-radius:30px;

}



/* MAIN BANNER */


.hero{


height:600px;


background:linear-gradient(
120deg,
#111827,
#2563eb
);


display:flex;


align-items:center;


padding-left:10%;


color:white;


}



.hero-content{

position:relative;

}



.slide{

display:none;

animation:fade .8s;

}


.slide.active{

display:block;

}



.slide h1{

font-size:65px;

line-height:1.3;

margin-bottom:30px;

}



.slide p{

font-size:30px;

font-weight:900;

line-height:1.6;

}



/* 슬라이드1 기숙사 */


.dorm-area{

display:flex;

align-items:flex-start;

gap:60px;

}



.dorm-left{

display:flex;

flex-direction:column;

gap:15px;

}



.dorm-left p{

font-size:34px;

font-weight:800;

}



.stay-free{

background:#38bdf8;

color:white;

padding:15px 30px;

border-radius:15px;

font-size:28px;

font-weight:800;

box-shadow:

0 5px 15px rgba(56,189,248,.35);

}



.room-free{

display:flex;

gap:30px;

color:#2563eb;

font-size:24px;

font-weight:800;

}



/* 슬라이드 표시 */


.slide-indicator{

display:flex;

gap:10px;

margin-top:45px;

}


.indicator{

width:40px;

height:5px;

background:rgba(255,255,255,.4);

border-radius:10px;

}


.indicator.active{

width:70px;

background:white;

}




@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}



</style>

</head>


<body>


<header class="header">


<div class="logo">

HUMAN

<span>ACADEMY</span>

</div>



<nav class="nav">

<a>국비지원과정</a>

<a>취업지원센터</a>

<a>협력기업리스트</a>

<a>수강후기 및 공지</a>

<a>상담센터</a>

<a>교육원소개</a>

<a>실무자 특강</a>

</nav>



<div class="header-right">

<button>
상담신청
</button>

</div>


</header>





<section class="hero">


<div class="hero-content">



<!-- SLIDE 1 -->


<div class="slide active">


<h1>

기숙사 이용료<br>

전액무료

</h1>



<div class="dorm-area">


<div class="dorm-left">


<p>

휴먼학생 누구나

</p>


<div class="room-free">


<span>
수강생 무료
</span>


<span>
1인 1실
</span>


</div>


</div>




<div class="stay-free">

숙식무료

</div>



</div>


</div>








<!-- SLIDE 2 -->


<div class="slide">


<h1>

맞춤형 채용정보부터<br>

포트폴리오 관리까지

</h1>


<p>

성공적인 커리어를 위한<br>

원스톱 플랫폼

</p>


</div>






<div class="slide-indicator">


<span class="indicator active"></span>

<span class="indicator"></span>

</div>



</div>


</section>







<script>


const slides =
document.querySelectorAll(".slide");


const indicators =
document.querySelectorAll(".indicator");


let currentSlide=0;



setInterval(()=>{


slides[currentSlide]
.classList.remove("active");


indicators[currentSlide]
.classList.remove("active");



currentSlide++;


if(currentSlide>=slides.length){

currentSlide=0;

}



slides[currentSlide]
.classList.add("active");


indicators[currentSlide]
.classList.add("active");



},5000);



</script>


</body>

</html>
    
</body>
</html>
