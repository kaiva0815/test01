<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .box{
        border: 1px solid red;
        width: 100px;
        height: 100px;
        background-color: green;
        margin: 10px;
        color: white;
        /* transition: all 0.5s; */
        /* transition: width 1s; */
    }
    .box1:hover{
        background-color:black;
        border-radius: 50%;
        width: 200px;
        height: 200px;
        
    }
    
    .box2:hover{
        background-color:black;
        border-radius: 50%;
        width: 200px;
        height: 200px;
        transition: all 0.5s;
        
    }

    </style>
</head>
<body>
    <div class="box box1">박스</div>
    <div class="box box2">박스2</div>
    
</body>
</html>
