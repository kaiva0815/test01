<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* CSS 주석 */
        /* 여러줄 주석 
        ㅣ
        ㅣ*/
        /* *는 전체 선텍자 
        현재 페이지에 있는 모든 태그를 선택한다.*/
        * {
            color:red;
        }

        /* tag 선택자
        ex h1{ color:red;} 로 쓸 수 있다
        태그 명에 적는다
        모든 태그에 적용된다.
        */
        h2 {
            font-size: 300%
        }
        h1 { font-size: 300% }

        /* 다중 선택자
        ,로 구분해서 여러개를 동시에 적용이 가능하다
        여러 선택자에 같은 내용을 한번에 적용
        선택자 들을 ,로 나열하기
        ex 선택자1, 선택자2 */
        h1, h2{ 
            font-size:300%
        }
        /* #은 id 선택자
        id 앞에 #을 찍는다.
        id 속성은 모든 태그에 적용이 가능하다
        하지만 가능하면 한 페이지에는 하나의 id만 적용하는것이 기본.
        id는 값을 하나만 가질 수 있다.
        ex
        <style>
            #id123
        /style>
        <h1 id="id123">내용</h1>
        */
        #li1 {
            color:black;
        }
        /* .은 클래스 선택자
        클래스 값을 가지는 모든 곳에 적용이 된다.
        중복을 허용한다.
            여러 태그에 같은 class가 사용이 가능하다.
        띄어쓰기를 이용해서 여러개의 클래스를 가질 수 있다.
        클래스는 여러개를 줄 수 있다
        클래스명 앞에 .(점)을 찍는다.
        ex
        <style>
            .c1
        /style>
        <h1 class="c1, c2">내용</h1>
        */
        .c1{
            background-color:green;
        }
        .bigText {
            font-size:30px;
        }
        /* 속성 선택자 
        ex [속성명] : 해당 속성이 있는 모든 태그
        [속성명=값] : 속성이 존재하고 값도 일치하는 모든 태그
        [속성명^=값] : 속성이 존재하고 값으로 시작하는 모든 태그
        [속성명$=값] : 속성이 존재하고 값으로 끝나는 모든 태그
        */
        /* 그냥 속성이 존재한다면 */
        [readonly] {background-color:yellow;}
        
        /* 속성이 있고 값도 일치하면 */
        [type=password] {
            background-color:pink;
        }

        /* #li3은 [id=li3]의 줄임말 */
        [id="li3"] {
            border: 3px solid red;
        }
        /* href 속성의 값이 https로 시작하는 모든것 */
        [href^=https] {
            color:purple;
        }
        
        /* $는 href 속성의 값이 com으로 끝나는것 */
        [href$=com]{
            font-size:30px;
        }
        /* ~= : 띄어쓰기로 구분되는 값 */
        /* bigText는 [class~=bitText] */
        [class~=bigText]{
            color:#0000ff;
        }
        /* 딱 붙혀서 쓰면 모든 항목을 동시에 만족해야하는 그리고 조건이 된다. */
        h2.c1 { color:rgb(200,100,0)
        }
        /* li 태그면서 c1과 c2 클래스를 가지는 것 선택해보자*/
        /* .은 클래스 속성을 찾는것 */
        li.c1.c2{
            background-color:yellow;
        }

        /*자손 선택자
        자식 또는 자식의 자식등 하위에 있는 자손 중에서 선택된다.
        */
        div strong {
            color:blue;
        }
        /* 자식 선택자 
        바로 아래 자식 요소만 선택 가능
        자손은 띄어쓰기 자식은 >(꺽새표시)
        */
        div > strong {
            font-size:40px;
        }


        /*가상 선택자
        hover는 마우스를 올리고 있을때
        active는 마우스를 누를때
        focus는 선택요소가 선택되었을때
                ㄴ마우스로 클릭하거나 tab으로 이동
        checked:checkbox, radio 가 선택된 상태.
        nth-child
            n:숫자
            th:서수(몇 번째)
            선택자 중에서 몇 번째 자식을 지정
            ()안에 숫자를 넣어 지정함.
                2n은 짝수
                2n+1은 홀수
                
        */

        #div1:hover{
            background-color:yellow;
        }

        #div1:active{
            background-color:green;
        }
        
        .text1:focus{
            background-color:yellow;            
        }

        input[type=checkbox]:checked{
            width:20px;
            hight:20px;
        }


        /*체크박스 라디오가 선택된 상태일때*/
        input[type=checkbox]:checked + span{
            text-decoration: line-through;
        }

        /* + 는 바로 다음 형제만 취급함 */
        /* ~ 는 바로 다음 형제들을 취급함 */

        /* nth는 몇번째 요소
        2n은 짝수 2n+1은 홀수*/
        #ul1 > li:nth-child(2n+1) {
            color:black;
        }
        #ul1 > li:nth-child(2n) {
            background-color:gray;
        }
        #ul1 > li:not(.c3){
            font-size:32px;
        } 
        /* not(선택자):해당 선택자를 제외한다.
        ex ul li:not(.c3) { . . . }
        ㄴ ul 자손 중에 모든 li에 class c3가 없는것.
        */

        /* after before 
        선택자 앞 또는 뒤에 contetn 추가 및 css의 적용
        특이사항으로 자바스크립트로 변경할 수 없다.
        */
        h3::before{
        content: "before";
        color:black; }

        h3::after{
            content: "after";
            color:blue;
        }

        ::selection {
            background-color: aqua;
        }

        /*형제 선택자
        +:바로 다음 형제를 선택
        ex
        <style>
            input[type=checkbox]:checked + sapn
            text-decoration: line-thrgouh;
        /style>        
        */

        /*
        우선순위
        important > style 속성 > #id > .class = 속성 > 태그 > *전체 선택자 > 브라우저 기본값
        동등한 우선순위인 경우 나중에 나오는 것이 높다.
        구체적일수록 우선순위가 높다.
        */
        
        #div2 {
            border: 1px solid aqua;
        }
        [human] {
            border: 1px solid pink !important;
            /* important 남발은 자제*/
        }
        .c4 {
            border: 1px solid blue;
        }
        div {
            border: 1px solid red;
        }

        #table .no{
            background-color:yellow;
        }

        #table [id^=title_]{
            border: 1px solid blue;
        }
        /* 좀 더 구체적으로 태그를 짜놓을것 */


        
        

    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hello world</h1>
    <h2 class="c1">부제목</h2>

    <ul>
        <li id="li1" class="c1">li 1</li>
        <li class="c1 bigText c2">li 2</li>
        <li id="li3">li 3</li>
    </ul>
        <input type="text" readonly><br>
        <input type="password"><br>

    <a href="http://naver.com">http</a><br>
    <a href="https://daum.net">https</a><br>

    <strong>밖에 있는 strong</strong>

    <div>
        <strong>div 안에 있는 strong</strong>
    </div>

    <div>
        <a href="#">
        <strong>div 안의 a 안에 있는 strong</strong>
    </div>

    <hr>
    <div id="div1">
        hover 연습
    </div>

    focus 연습 : <input type="text" class="text1"><br>

    <input type="checkbox"> 
    checked연습 
    <br>
    <input type="checkbox">
        <span>점심먹기</span>
        <ul id="ul1">
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li class="c3">4</li>
            <li class="c3">5</li>
        </ul>

        <h3>비포에프터 연습</h3>

        <div class="c4" id="div2" human="천안" style="border: 1px solid black;">
            우선순위 연습
        </div>



        <!-- no는 노랑배경
        title_은 빨간색 네모가 들어가게
        -->
        <table id="table" border="1">
            <tr>
                <td class="no">No</td>
                <td id="title_0">제목</td>
                <td>글쓴이</td>
            </tr>
            <tr>
                <td class="no">1</td>
                <td id="title_1">제목1</td>
                <td>글쓴이1</td>
            </tr>
            <tr>
                <td class="no">2</td>
                <td id="title_2">제목2</td>
                <td>글쓴이2</td>
            </tr>
        </table>




        <br>      <br>      <br>      <br>      <br>      <br>      <br>      <br>      <br>      <br>
</body>
</html>
