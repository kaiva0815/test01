<!DOCTYPE html>
<!-- img를 사용할 때 alt(이미지가 없습니다, 무슨 이미지가 있었는지 등)는 사용하는것이 좋음 -->
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <!-- alt는 대체텍스트이며, 웹 접근성에 이롭게 하기 위해 적어놓는 것(이후 이미지로 표기되게 할 수도 있음) -->
        <img src="asset/Spongebob-Christmas-PNG-Picture.png" alt="스폰지밥이 웃고있는 사진">
        <br>
        <!-- 아래처럼 나뉘어 진 부분은 엔터로 내릴 수 있으나 s rc같이 속성을 나누는것은 할 수 없음 -->
        <!-- 너비,높이를 하나만 했을 때 원본의 비율유지를 해서 맞춤(보통 너비만 많이 사용 함, CSS에서 주로 조작) -->
        <!-- Temp라이브러리 임시폴더에 유튜브,이미지 등을 다운받아와서 보여주는 시스템(동영상도 프레임으로 사진이 초당 여러장)
            img태그도 해당 링크로 가서 다운받아온 후 출력 -->
        <img src="asset/Spongebob-Christmas-PNG-Picture.png" alt="스폰지밥이 웃고있는 사진" width="200" height="300">
        <br>

        <!-- iframe은 내 브라우저 안에 또 다른 브라우저를 열게해 창 구역을 표시함 -->
        <!-- <iframe width="560" height="315" src="https://www.youtube.com/embed/k1LFrntx6UM?si=xkSqvIN5EcgC3One"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
        
        <!-- 웹 접근성을 용이하게 하기 위해 controls등 옵션값은 넣어주는편이 좋음 -->
        <video 
            controls="controls" 
            loop="loop"
            src="https://www.w3schools.com/tags/movie.mp4">
        </video>

    </body>
</html>
